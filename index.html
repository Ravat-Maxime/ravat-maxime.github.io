<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire — Brief de création web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1a1a1a;--paper:#f7f5f0;--warm:#e8e4dc;
  --accent:#c45d3e;--accent-light:#f0d5cc;--accent-dark:#a04a30;
  --muted:#8a8478;--card:#fff;--radius:12px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 20px rgba(0,0,0,.08);
  --font-body:'DM Sans',sans-serif;--font-display:'Fraunces',serif;
  --transition:.2s cubic-bezier(.4,0,.2,1);
}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.6}
.app{max-width:860px;margin:0 auto;padding:20px 16px 100px}

/* Header */
.header{text-align:center;padding:48px 20px 40px}
.header h1{font-family:var(--font-display);font-weight:700;font-size:clamp(1.8rem,5vw,2.6rem);line-height:1.15;letter-spacing:-.02em;margin-bottom:12px}
.header p{color:var(--muted);font-size:.95rem;max-width:520px;margin:0 auto;line-height:1.6}

/* Progress */
.progress-bar{position:sticky;top:0;z-index:100;background:var(--paper);padding:12px 0 8px;border-bottom:1px solid var(--warm)}
.progress-track{height:4px;background:var(--warm);border-radius:4px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress-label{font-size:.75rem;color:var(--muted);text-align:right}

/* Nav */
.nav-pills{display:flex;gap:6px;overflow-x:auto;padding:12px 0 20px;scrollbar-width:none;-ms-overflow-style:none}
.nav-pills::-webkit-scrollbar{display:none}
.nav-pill{flex-shrink:0;padding:8px 14px;border-radius:99px;border:1.5px solid var(--warm);background:transparent;font-family:var(--font-body);font-size:.78rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--transition);white-space:nowrap}
.nav-pill:hover{border-color:var(--accent);color:var(--ink)}
.nav-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-pill.has-data{border-color:var(--accent-light);color:var(--ink)}

/* Sections */
.section{background:var(--card);border-radius:var(--radius);padding:32px 28px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--warm)}
.section-icon{font-size:1.5rem}
.section-title{font-family:var(--font-display);font-size:1.35rem;font-weight:600}

/* Questions */
.question{margin-bottom:24px}
.question:last-child{margin-bottom:0}
.question-label{display:block;font-weight:600;font-size:.88rem;margin-bottom:8px}
.question-hint{display:block;font-size:.78rem;color:var(--muted);margin-bottom:8px;font-weight:400;font-style:italic}

input[type="text"],textarea{width:100%;padding:12px 14px;border:1.5px solid var(--warm);border-radius:8px;font-family:var(--font-body);font-size:.88rem;color:var(--ink);background:var(--paper);transition:border-color var(--transition),box-shadow var(--transition);resize:vertical;outline:none}
input[type="text"]:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
textarea{min-height:80px}
textarea.small{min-height:56px}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 16px;border-radius:99px;border:1.5px solid var(--warm);background:transparent;font-family:var(--font-body);font-size:.82rem;font-weight:500;color:var(--ink);cursor:pointer;transition:all var(--transition);user-select:none}
.chip:hover{border-color:var(--accent);background:var(--accent-light)}
.chip.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* File upload */
.file-upload-zone{border:2px dashed var(--warm);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all var(--transition);background:var(--paper);position:relative}
.file-upload-zone:hover{border-color:var(--accent);background:var(--accent-light)}
.file-upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-upload-icon{font-size:1.8rem;margin-bottom:6px}
.file-upload-text{font-size:.82rem;color:var(--muted)}
.file-preview{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--paper);border-radius:10px;border:1.5px solid var(--warm)}
.file-preview img{width:56px;height:56px;object-fit:contain;border-radius:6px;background:#fff;border:1px solid var(--warm)}
.file-preview-info{flex:1}
.file-preview-name{font-size:.85rem;font-weight:600;word-break:break-all}
.file-preview-size{font-size:.75rem;color:var(--muted)}
.file-remove{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px;transition:all var(--transition)}
.file-remove:hover{color:var(--accent);background:var(--accent-light)}

/* Color picker */
.color-picker-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.color-swatch-wrapper{display:flex;flex-direction:column;align-items:center;gap:6px}
.color-swatch{width:48px;height:48px;border-radius:50%;border:2.5px solid var(--warm);cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.color-swatch:hover{transform:scale(1.1);border-color:var(--accent);box-shadow:var(--shadow)}
.color-swatch.empty{background:var(--paper)}
.color-swatch input[type="color"]{position:absolute;inset:-8px;width:64px;height:64px;opacity:0;cursor:pointer}
.color-hex-label{font-size:.68rem;color:var(--muted);letter-spacing:.02em}

/* Repeater (services) */
.repeater-item{border:1.5px solid var(--warm);border-radius:10px;padding:20px;margin-bottom:12px;background:var(--paper);position:relative;transition:all var(--transition)}
.repeater-item:hover{border-color:var(--accent-light)}
.repeater-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.repeater-row.full{grid-template-columns:1fr}
.repeater-remove{position:absolute;top:12px;right:12px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px;transition:all var(--transition)}
.repeater-remove:hover{color:var(--accent);background:var(--accent-light)}
.repeater-label{font-size:.78rem;font-weight:500;color:var(--muted);margin-bottom:4px;display:block}
.repeater-add{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:99px;border:1.5px dashed var(--warm);background:transparent;font-family:var(--font-body);font-size:.82rem;color:var(--muted);cursor:pointer;transition:all var(--transition)}
.repeater-add:hover{border-color:var(--accent);color:var(--accent)}

/* Buttons */
.actions{display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap;margin-top:32px;padding-top:24px;border-top:1px solid var(--warm)}
.btn{padding:12px 28px;border-radius:99px;font-family:var(--font-body);font-size:.88rem;font-weight:600;cursor:pointer;transition:all var(--transition);border:none;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.btn-secondary{background:transparent;border:1.5px solid var(--warm);color:var(--ink)}
.btn-secondary:hover{border-color:var(--accent)}
.btn-ghost{background:transparent;color:var(--muted);padding:12px 16px}
.btn-ghost:hover{color:var(--accent)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:99px;font-size:.85rem;font-weight:500;box-shadow:var(--shadow-lg);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:1000}
.toast.visible{transform:translateX(-50%) translateY(0)}

/* Thank you screen */
.thankyou{text-align:center;padding:80px 20px}
.thankyou h2{font-family:var(--font-display);font-size:2rem;margin-bottom:16px}
.thankyou p{color:var(--muted);font-size:1rem;max-width:440px;margin:0 auto 32px;line-height:1.7}
.thankyou .check{font-size:4rem;margin-bottom:20px;display:block}

@media(max-width:600px){
  .section{padding:24px 18px}
  .actions{flex-direction:column}
  .btn{width:100%;justify-content:center}
  .repeater-row{grid-template-columns:1fr}
}
</style>
</head>

// ─── STATE ───
let data = {};
let activeSection = 0;
let submitted = false;

function val(id) { return data[id]; }
function setVal(id, v) { data[id] = v; render(); }

// ─── RENDER HELPERS ───
function renderChips(q) {
  const selected = data[q.id] || (q.multi ? [] : "");
  return `<div class="chips">${q.options.map(opt => {
    const isSel = q.multi ? (selected||[]).includes(opt) : selected === opt;
    return `<button type="button" class="chip${isSel?' selected':''}" onclick="toggleChip('${q.id}',\`${opt}\`,${q.multi})">${opt}</button>`;
  }).join('')}</div>`;
}

function renderColorPicker(q) {
  const colors = data[q.id] || Array(q.count||5).fill("");
  const labels = ["Primaire","Secondaire","Accent","Fond","Texte"];
  return `<div class="color-picker-row">${colors.map((c,i) =>
    `<div class="color-swatch-wrapper">
      <div class="color-swatch${c?'':' empty'}" style="${c?`background:${c};border-color:${c}`:''}" >
        <input type="color" value="${c||'#c45d3e'}" onchange="setColor('${q.id}',${i},this.value)">
      </div>
      <span class="color-hex-label">${c||labels[i]||'#'+(i+1)}</span>
    </div>`
  ).join('')}</div>`;
}

function renderFile(q) {
  const f = data[q.id];
  if (f && f.name) {
    const isImg = f.type && f.type.startsWith('image/');
    return `<div class="file-preview">
      ${isImg?`<img src="${f.dataUrl}" alt="Aperçu">`:''}
      <div class="file-preview-info">
        <div class="file-preview-name">${f.name}</div>
        <div class="file-preview-size">${(f.size/1024).toFixed(1)} Ko</div>
      </div>
      <button class="file-remove" onclick="setVal('${q.id}',null)">✕</button>
    </div>`;
  }
  return `<div class="file-upload-zone">
    <input type="file" accept="${q.accept||'image/*'}" onchange="handleFile('${q.id}',this)">
    <div class="file-upload-icon">📎</div>
    <div class="file-upload-text">${q.placeholder||'Glissez un fichier ou cliquez'}</div>
  </div>`;
}

function renderRepeater(q) {
  const items = data[q.id] || [];
  let html = q.hint ? `<div class="question-hint">${q.hint}</div>` : '';
  items.forEach((item, idx) => {
    html += `<div class="repeater-item">
      <button class="repeater-remove" onclick="removeRepeaterItem('${q.id}',${idx})">✕</button>`;
    q.fields.forEach(f => {
      if (f.type === 'chips') {
        const sel = item[f.id] || '';
        html += `<div style="margin-bottom:10px"><span class="repeater-label">${f.label}</span>
          <div class="chips">${f.options.map(opt => {
            const isSel = sel === opt;
            return `<button type="button" class="chip${isSel?' selected':''}" onclick="setRepeaterChip('${q.id}',${idx},'${f.id}',\`${opt}\`)">${opt}</button>`;
          }).join('')}</div></div>`;
      } else {
        const isTA = f.type === 'textarea';
        const tag = isTA ? 'textarea' : 'input';
        const cls = isTA && f.small ? ' class="small"' : '';
        html += `<div style="margin-bottom:10px"><span class="repeater-label">${f.label}</span>
          <${tag}${cls} type="text" placeholder="${f.placeholder||''}" value="${item[f.id]||''}" 
            oninput="setRepeaterField('${q.id}',${idx},'${f.id}',this.value)"${isTA?'':''}>${isTA?(item[f.id]||''):''}</${isTA?'textarea':''}>
          ${isTA?'':''}
        </div>`;
      }
    });
    html += `</div>`;
  });
  html += `<button class="repeater-add" onclick="addRepeaterItem('${q.id}')">＋ Ajouter un service</button>`;
  return html;
}

function renderQuestion(q) {
  let inner = '';
  if (q.type === 'text') inner = `<input type="text" placeholder="${q.placeholder||''}" value="${data[q.id]||''}" oninput="setVal('${q.id}',this.value)">`;
  else if (q.type === 'textarea') inner = `<textarea class="${q.small?'small':''}" placeholder="${q.placeholder||''}" oninput="setVal('${q.id}',this.value)">${data[q.id]||''}</textarea>`;
  else if (q.type === 'chips') inner = renderChips(q);
  else if (q.type === 'colorpicker') inner = renderColorPicker(q);
  else if (q.type === 'file') inner = renderFile(q);
  else if (q.type === 'repeater') inner = renderRepeater(q);
  const hint = (q.hint && q.type !== 'repeater') ? `<span class="question-hint">${q.hint}</span>` : '';
  return `<div class="question"><label class="question-label">${q.label}</label>${hint}${inner}</div>`;
}

// ─── COMPUTE ───
function countFilled() {
  let filled = 0, total = 0;
  SECTIONS.forEach(sec => sec.questions.forEach(q => {
    total++;
    const v = data[q.id];
    if (!v) return;
    if (q.type === 'file') { if(v.name) filled++; return; }
    if (q.type === 'colorpicker') { if(Array.isArray(v) && v.some(c=>c)) filled++; return; }
    if (q.type === 'repeater') { if(Array.isArray(v) && v.length>0) filled++; return; }
    if (Array.isArray(v)) { if(v.length>0) filled++; return; }
    if (typeof v === 'string' && v.trim()) filled++;
  }));
  return {filled,total};
}
function sectionHasData(sec) {
  return sec.questions.some(q => {
    const v = data[q.id];
    if(!v) return false;
    if(q.type==='file') return !!v.name;
    if(q.type==='colorpicker') return Array.isArray(v)&&v.some(c=>c);
    if(q.type==='repeater') return Array.isArray(v)&&v.length>0;
    if(Array.isArray(v)) return v.length>0;
    return typeof v==='string'&&v.trim()!=='';
  });
}

// ─── BRIEF GENERATOR ───
function generateBrief() {
  let lines = [];
  lines.push("══════════════════════════════════════════");
  lines.push("       BRIEF DE CRÉATION DE SITE WEB");
  lines.push("══════════════════════════════════════════");
  lines.push("");
  const d = new Date();
  lines.push("Généré le " + d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}));
  lines.push("");

  SECTIONS.forEach(sec => {
    const items = [];
    sec.questions.forEach(q => {
      const v = data[q.id];
      if(!v) return;
      if(q.type==='file') { if(v.name) items.push({label:q.label,display:"Fichier fourni : "+v.name}); return; }
      if(q.type==='colorpicker') {
        const labels=["Primaire","Secondaire","Accent","Fond","Texte"];
        const filled=v.map((c,i)=>c?`${labels[i]||'#'+(i+1)}: ${c}`:null).filter(Boolean);
        if(filled.length) items.push({label:q.label,display:filled.join(", ")});
        return;
      }
      if(q.type==='repeater') {
        if(!Array.isArray(v)||v.length===0) return;
        v.forEach((item,idx)=>{
          const parts=[];
          q.fields.forEach(f=>{if(item[f.id]) parts.push(`${f.label}: ${item[f.id]}`);});
          if(parts.length) items.push({label:`Service ${idx+1}`,display:parts.join(" | ")});
        });
        return;
      }
      const display = Array.isArray(v)?v.join(", "):v;
      if(display && (typeof display!=='string'||display.trim())) items.push({label:q.label,display});
    });
    if(!items.length) return;
    lines.push("");
    lines.push(`▸ ${sec.icon} ${sec.title.toUpperCase()}`);
    lines.push("─".repeat(44));
    items.forEach(it=>{
      lines.push(`${it.label} :`);
      lines.push(`  → ${it.display}`);
      lines.push("");
    });
  });

  lines.push("");
  lines.push("══════════════════════════════════════════");
  lines.push("             FIN DU BRIEF");
  lines.push("══════════════════════════════════════════");
  return lines.join("\n");
}

// ─── ACTIONS ───
window.toggleChip = function(id, opt, multi) {
  if (multi) {
    const arr = Array.isArray(data[id]) ? [...data[id]] : [];
    const idx = arr.indexOf(opt);
    if (idx > -1) arr.splice(idx,1); else arr.push(opt);
    setVal(id, arr);
  } else {
    setVal(id, data[id] === opt ? "" : opt);
  }
};
window.setColor = function(id, idx, color) {
  const arr = Array.isArray(data[id]) ? [...data[id]] : Array(5).fill("");
  arr[idx] = color;
  setVal(id, arr);
};
window.handleFile = function(id, input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    setVal(id, {name:file.name, size:file.size, type:file.type, dataUrl:e.target.result});
  };
  reader.readAsDataURL(file);
};
window.addRepeaterItem = function(id) {
  const arr = Array.isArray(data[id]) ? [...data[id]] : [];
  arr.push({});
  setVal(id, arr);
};
window.removeRepeaterItem = function(id, idx) {
  const arr = [...(data[id]||[])];
  arr.splice(idx,1);
  setVal(id, arr);
};
window.setRepeaterField = function(id, idx, field, value) {
  const arr = [...(data[id]||[])];
  arr[idx] = {...(arr[idx]||{}), [field]: value};
  data[id] = arr; // no re-render to avoid cursor jump
};
window.setRepeaterChip = function(id, idx, field, opt) {
  const arr = [...(data[id]||[])];
  const cur = arr[idx]?.[field];
  arr[idx] = {...(arr[idx]||{}), [field]: cur===opt ? '' : opt};
  setVal(id, arr);
};

function downloadBrief() {
  const brief = generateBrief();
  const blob = new Blob([brief], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const nom = (data.nom_entreprise || 'brief').replace(/[^a-zA-Z0-9àâéèêëïôùûç\s-]/g,'').replace(/\s+/g,'-').toLowerCase();
  a.download = `brief-web-${nom}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  // show toast
  const toast = document.getElementById('toast');
  toast.classList.add('visible');
  setTimeout(()=>toast.classList.remove('visible'), 2500);
  // show thank you
  submitted = true;
  render();
}

function resetAll() {
  if (confirm("Effacer toutes les réponses ?")) { data = {}; submitted = false; render(); }
}

function scrollToSec(idx) {
  activeSection = idx;
  render();
  const el = document.getElementById('sec-'+idx);
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ─── MAIN RENDER ───
function render() {
  const {filled,total} = countFilled();
  const pct = Math.round((filled/total)*100);
  const app = document.getElementById('app');

  if (submitted) {
    app.innerHTML = `
      <div class="thankyou">
        <span class="check">✓</span>
        <h2>Merci !</h2>
        <p>Votre brief a été téléchargé avec succès. Envoyez le fichier <strong>.txt</strong> par email et nous reviendrons vers vous rapidement.</p>
        <button class="btn btn-secondary" onclick="submitted=false;render()">← Modifier mes réponses</button>
      </div>`;
    return;
  }

  let html = `
    <div class="header">
      <h1>Brief de création web</h1>
      <p>Remplissez ce questionnaire pour nous aider à bien comprendre votre projet. Prenez votre temps, chaque détail compte.</p>
    </div>
    <div class="progress-bar">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${filled} / ${total} champs renseignés — ${pct}%</div>
    </div>
    <div class="nav-pills">
      ${SECTIONS.map((s,i)=>`<button class="nav-pill${activeSection===i?' active':''}${sectionHasData(s)&&activeSection!==i?' has-data':''}" onclick="scrollToSec(${i})">${s.icon} ${s.title}</button>`).join('')}
    </div>`;

  SECTIONS.forEach((sec,i) => {
    html += `<div class="section" id="sec-${i}" onclick="activeSection=${i}">
      <div class="section-header">
        <span class="section-icon">${sec.icon}</span>
        <span class="section-title">${sec.title}</span>
      </div>
      ${sec.intro?`<p style="color:var(--muted);font-size:.88rem;margin-bottom:20px;margin-top:-8px">${sec.intro}</p>`:''}
      ${sec.questions.map(q=>renderQuestion(q)).join('')}
    </div>`;
  });

  html += `<div class="actions">
    <button class="btn btn-ghost" onclick="resetAll()">↺ Tout effacer</button>
    <button class="btn btn-primary" onclick="downloadBrief()">📥 Télécharger mon brief</button>
  </div>`;

  app.innerHTML = html;
}

// ─── INIT ───
render();
</script>
